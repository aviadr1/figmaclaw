version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    groups:
      pip-patch-minor:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      pip-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    groups:
      github-actions-patch-minor:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - "major"
