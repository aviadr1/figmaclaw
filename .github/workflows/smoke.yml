name: Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "figmaclaw/**/*.py"
      - "tests/smoke/**/*.py"
      - ".github/workflows/smoke.yml"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Validate FIGMA_API_KEY secret is configured
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
        run: |
          if [ -z "${FIGMA_API_KEY}" ]; then
            echo "::error::Missing required secret FIGMA_API_KEY for smoke-api workflow."
            exit 1
          fi

      - name: Run enforced live API smoke tests
        env:
          FIGMACLAW_REQUIRE_LIVE_SMOKE: "1"
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          FIGMA_WEBHOOK_TEAM_ID: ${{ secrets.FIGMA_WEBHOOK_TEAM_ID }}
        run: uv run pytest -q -m smoke_api -rs
