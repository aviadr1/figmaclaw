name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect Python-impacting changes
        id: changed
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            **/*.py

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff format (check only)
        if: steps.changed.outputs.any_changed == 'true'
        run: uv run ruff format --check ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed; skipping ruff format check."

  ruff-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect Python-impacting changes
        id: changed
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            **/*.py

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff lint
        if: steps.changed.outputs.any_changed == 'true'
        run: uv run ruff check ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed; skipping ruff lint."

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed Python files
        id: changed
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            **/*.py

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Basedpyright
        if: steps.changed.outputs.any_changed == 'true'
        run: uv run --group dev python -m basedpyright ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed; skipping basedpyright."

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed Python files
        id: changed
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            **/*.py

      - name: Set up Python
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.changed.outputs.any_changed == 'true'
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        if: steps.changed.outputs.any_changed == 'true'
        run: uv sync --dev

      - name: Run tests with coverage gate
        if: steps.changed.outputs.any_changed == 'true'
        run: >
          uv run python -m pytest -q
          -m "not smoke_api and not smoke_webhook and not smoke_mcp"
          --junitxml=test-results/pytest-junit.xml
          --cov=figmaclaw
          --cov-report=term-missing
          --cov-report=xml:test-results/coverage.xml
          --cov-fail-under=70

      - name: Upload test artifacts
        if: always() && steps.changed.outputs.any_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Publish JUnit report
        if: always() && hashFiles('test-results/pytest-junit.xml') != ''
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: test-results/pytest-junit.xml
          include_passed: false

      - name: Upload coverage to Codecov
        if: always() && hashFiles('test-results/coverage.xml') != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: test-results/coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: No Python-impacting changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python or dependency changes; skipping tests."

  smoke-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed Python files
        id: changed
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            **/*.py

      - name: Set up Python
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.changed.outputs.any_changed == 'true'
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        if: steps.changed.outputs.any_changed == 'true'
        run: uv sync --dev

      - name: Validate FIGMA_API_KEY secret is configured
        if: steps.changed.outputs.any_changed == 'true'
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
        run: |
          if [ -z "${FIGMA_API_KEY}" ]; then
            echo "::error::Missing required secret FIGMA_API_KEY for smoke-api job."
            exit 1
          fi

      - name: Run enforced live API smoke
        if: steps.changed.outputs.any_changed == 'true'
        env:
          FIGMACLAW_REQUIRE_LIVE_SMOKE: "1"
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          FIGMA_WEBHOOK_TEAM_ID: ${{ secrets.FIGMA_WEBHOOK_TEAM_ID }}
        run: >
          uv run python -m pytest -q
          -m smoke_api
          -rs

      - name: No Python-impacting changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python or dependency changes; skipping smoke-api."
