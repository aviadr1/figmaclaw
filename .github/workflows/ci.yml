name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect Python-impacting changes
        id: changed
        uses: tj-actions/changed-files@48d8f15b2aaa3d255ca5af3eba4870f807ce6b3c # v45
        with:
          files: |
            **/*.py
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff format (check only)
        if: steps.changed.outputs.any_changed == 'true'
        run: uv run ruff format --check ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed; skipping ruff format check."

  ruff-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed Python files
        id: changed
        uses: tj-actions/changed-files@48d8f15b2aaa3d255ca5af3eba4870f807ce6b3c # v45
        with:
          files: |
            **/*.py

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff lint
        if: steps.changed.outputs.any_changed == 'true'
        run: uv run ruff check ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed; skipping ruff lint."

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed Python files
        id: changed
        uses: tj-actions/changed-files@48d8f15b2aaa3d255ca5af3eba4870f807ce6b3c # v45
        with:
          files: |
            **/*.py

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Basedpyright
        if: steps.changed.outputs.any_changed == 'true'
        run: uv run --group dev python -m basedpyright ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed; skipping basedpyright."

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect changed Python files
        id: changed
        uses: tj-actions/changed-files@48d8f15b2aaa3d255ca5af3eba4870f807ce6b3c # v45
        with:
          files: |
            **/*.py

      - name: Set up Python
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.changed.outputs.any_changed == 'true'
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        if: steps.changed.outputs.any_changed == 'true'
        run: uv sync --dev

      - name: Run tests with coverage gate
        if: steps.changed.outputs.any_changed == 'true'
        run: >
          uv run python -m pytest -q
          --junitxml=test-results/pytest-junit.xml
          --cov=figmaclaw
          --cov-report=term-missing
          --cov-report=xml:test-results/coverage.xml
          --cov-fail-under=70

      - name: Upload test artifacts
        if: always() && steps.changed.outputs.any_changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Publish JUnit report
        if: always() && hashFiles('test-results/pytest-junit.xml') != ''
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        with:
          report_paths: test-results/pytest-junit.xml
          include_passed: false

      - name: Upload coverage to Codecov
        if: always() && hashFiles('test-results/coverage.xml') != ''
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: test-results/coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: No Python-impacting changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python or dependency changes; skipping tests."
