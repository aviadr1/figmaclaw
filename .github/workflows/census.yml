# Reusable workflow — called by host repos via:
#   uses: aviadr1/figmaclaw/.github/workflows/census.yml@main
#
# Snapshots all published component sets for tracked files into _census.md.
# Hash-gated: only writes and commits when the component registry actually changes.
# One REST call per tracked file — runs in seconds.

on:
  workflow_call:
    inputs:
      file_key:
        description: 'Census only this file key (default: all tracked files)'
        required: false
        type: string
        default: ''
      figmaclaw_ref:
        required: false
        type: string
        default: main
      target_ref:
        required: false
        type: string
        default: ''
    secrets:
      FIGMA_API_KEY:
        required: true

jobs:
  census:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install figmaclaw
        run: pip install uv && uv tool install "git+https://github.com/aviadr1/figmaclaw@${{ inputs.figmaclaw_ref }}"

      - name: Pull latest changes
        run: git pull --no-rebase --ff-only origin "${{ inputs.target_ref || github.ref_name }}"

      - name: Configure git
        run: |
          git config user.name "figmaclaw[bot]"
          git config user.email "figmaclaw[bot]@users.noreply.github.com"

      - name: Run census
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
        run: |
          if [ -n "${{ inputs.file_key }}" ]; then
            figmaclaw census --file-key "${{ inputs.file_key }}" --auto-commit
          else
            figmaclaw census --auto-commit
          fi

      - name: Push
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
        run: |
          set -euo pipefail

          set +e
          git push
          PUSH_STATUS=$?
          set -e

          if [ "$PUSH_STATUS" -eq 0 ]; then
            exit 0
          fi

          echo "Push rejected; replaying census refresh on latest ${{ inputs.target_ref || github.ref_name }}"
          git fetch origin "${{ inputs.target_ref || github.ref_name }}"
          # Canon WF-1: reset to latest source state and replay deterministic
          # generation instead of merging stale generated registry markdown.
          # This is safe only because this GitHub runner has no human edits,
          # this job writes only deterministic census artifacts, and the next
          # command immediately recomputes those artifacts from Figma. Do not
          # copy this reset pattern to LLM/human-authored body workflows.
          git reset --hard "origin/${{ inputs.target_ref || github.ref_name }}"

          if [ -n "${{ inputs.file_key }}" ]; then
            figmaclaw census --file-key "${{ inputs.file_key }}" --auto-commit
          else
            figmaclaw census --auto-commit
          fi

          git push
