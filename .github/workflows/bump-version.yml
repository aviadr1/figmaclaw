name: Bump plugin version

on:
  push:
    branches: [main]

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Bump patch version and write build info
        env:
          TRIGGER_SHA: ${{ github.event.head_commit.id }}
          TRIGGER_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import re
          from pathlib import Path

          pyproject_path = Path("pyproject.toml")
          plugin_path = Path(".claude-plugin/plugin.json")
          marketplace_path = Path(".claude-plugin/marketplace.json")
          build_info_path = Path("figmaclaw/_build_info.py")

          # Bump version in pyproject.toml (single source of truth).
          pyproject = pyproject_path.read_text()
          m = re.search(r'^version = "([^"]+)"', pyproject, re.MULTILINE)
          if not m:
              raise RuntimeError("Could not find version in pyproject.toml")
          major, minor, patch = m.group(1).split(".")
          new_version = f"{major}.{minor}.{int(patch) + 1}"

          pyproject_path.write_text(
              re.sub(r'^(version = )"[^"]+"', f'\\1"{new_version}"', pyproject, flags=re.MULTILINE)
          )

          plugin = json.loads(plugin_path.read_text())
          plugin["version"] = new_version
          plugin_path.write_text(json.dumps(plugin, indent=2) + "\n")

          marketplace = json.loads(marketplace_path.read_text())
          for p in marketplace.get("plugins", []):
              if p["name"] == "figmaclaw":
                  p["version"] = new_version
          marketplace_path.write_text(json.dumps(marketplace, indent=2) + "\n")

          # Bake build info from the triggering commit (not the bump commit).
          sha = os.environ.get("TRIGGER_SHA", "")
          msg = os.environ.get("TRIGGER_MSG", "")
          first_line = msg.split("\n")[0].strip()
          pr_m = re.search(r'Merge pull request #(\d+)|\(#(\d+)\)', first_line)
          pr = (pr_m.group(1) or pr_m.group(2)) if pr_m else None

          build_info_path.write_text(
              "# Auto-generated by CI bump-version workflow. Do not edit manually.\n"
              f'__version__ = "{new_version}"\n'
              f'__commit__ = "{sha}"\n'
              f'__commit_message__ = {repr(msg)}\n'
              f'__pr__ = {repr(pr)}\n'
          )

          print(f"Bumped to {new_version} · commit={sha[:8]} · PR={pr}")
          EOF

      - name: Update uv.lock
        run: pip install uv && uv lock

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml .claude-plugin/plugin.json .claude-plugin/marketplace.json figmaclaw/_build_info.py uv.lock
          git diff --staged --quiet || git commit -m "chore: bump plugin version [skip ci]" && git push
