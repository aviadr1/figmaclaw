name: Bump plugin version

on:
  push:
    branches: [main]

concurrency:
  group: bump-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout latest branch head before bump
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "origin/${GITHUB_REF_NAME}"

      - name: Bump patch version and write build info
        env:
          TRIGGER_SHA: ${{ github.event.head_commit.id }}
          TRIGGER_MSG: ${{ github.event.head_commit.message }}
        run: python3 scripts/bump_version.py

      - name: Update uv.lock
        run: pip install uv && uv lock

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml .claude-plugin/plugin.json .claude-plugin/marketplace.json figmaclaw/_build_info.py uv.lock
          if git diff --staged --quiet; then
            echo "No version changes detected; exiting."
            exit 0
          fi

          git commit -m "chore: bump plugin version [skip ci]"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            sleep $((attempt * 2))
          done

          echo "Failed to push bump commit after 3 attempts."
          exit 1
