# Reusable workflow — called by host repos via:
#   uses: aviadr1/figmaclaw/.github/workflows/sync.yml@main
#
on:
  workflow_call:
    inputs:
      force:
        required: false
        type: string
        default: 'false'
      since:
        required: false
        type: string
        default: '3m'
      figma_team_id:
        required: false
        type: string
        default: ''
    secrets:
      FIGMA_API_KEY:
        required: true
      # ANTHROPIC_API_KEY is intentionally absent — figmaclaw pull has zero LLM dependency.
      # LLM enrichment is done by the caller's enrich job via claude-run.yaml.

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install figmaclaw
        run: uv tool install git+https://github.com/aviadr1/figmaclaw

      - name: Pull latest changes
        run: git pull --no-rebase --ff-only origin main

      - name: Configure git
        run: |
          git config user.name "figmaclaw[bot]"
          git config user.email "figmaclaw[bot]@users.noreply.github.com"

      - name: Discover and track new Figma files
        if: ${{ inputs.figma_team_id != '' }}
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          FIGMA_TEAM_ID: ${{ inputs.figma_team_id }}
          SINCE: ${{ inputs.since }}
        run: |
          figmaclaw list "$FIGMA_TEAM_ID" --since "$SINCE" --track-only | tee /tmp/figmaclaw-discover.txt || true
          git add .figma-sync/
          if ! git diff --cached --quiet; then
            NEWLY="$(grep '^NEWLY_TRACKED:' /tmp/figmaclaw-discover.txt | head -1 | sed 's/^NEWLY_TRACKED://' | tr -d '\n\r')"
            NEWLY="${NEWLY:-unknown}"
            git commit -m "sync: figmaclaw — tracking ${NEWLY} new file(s)"
            git push
            git pull --no-rebase --ff-only origin main
          fi

      - name: Pull Figma files (checkpointed loop)
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          FORCE_FLAG=""
          if [ "$INPUT_FORCE" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          # Guardrails to prevent a single sync job from monopolizing the workflow and
          # starving downstream enrich jobs indefinitely.
          MAX_BATCHES=180
          MAX_IDLE_HAS_MORE_BATCHES=3
          idle_has_more=0

          BATCH=0
          while true; do
            BATCH=$((BATCH + 1))
            if [ "$BATCH" -gt "$MAX_BATCHES" ]; then
              echo "Reached MAX_BATCHES=$MAX_BATCHES; stopping checkpoint loop early."
              break
            fi

            echo "--- batch $BATCH ---"

            if [ -n "$FORCE_FLAG" ]; then
              figmaclaw pull $FORCE_FLAG | tee /tmp/figmaclaw-out.txt || true
            else
              figmaclaw pull --max-pages 5 | tee /tmp/figmaclaw-out.txt || true
            fi

            git pull --no-rebase --ff-only origin main
            git add figma/ .figma-sync/
            committed=false
            if ! git diff --cached --quiet; then
              COMMIT_MSG="$(grep '^COMMIT_MSG:' /tmp/figmaclaw-out.txt | head -1 | sed 's/^COMMIT_MSG://' | tr -d '\n\r')"
              COMMIT_MSG="${COMMIT_MSG:-sync: figmaclaw — checkpoint batch $BATCH}"
              git commit -m "${COMMIT_MSG}"
              git push
              committed=true
            fi

            if grep -q '^HAS_MORE:true' /tmp/figmaclaw-out.txt; then
              if [ "$committed" = false ]; then
                idle_has_more=$((idle_has_more + 1))
                echo "HAS_MORE:true with no commit (idle_has_more=$idle_has_more/$MAX_IDLE_HAS_MORE_BATCHES)"
                if [ "$idle_has_more" -ge "$MAX_IDLE_HAS_MORE_BATCHES" ]; then
                  echo "Stopping loop after repeated HAS_MORE:true without progress."
                  break
                fi
              else
                idle_has_more=0
              fi
            else
              break
            fi

            [ -n "$FORCE_FLAG" ] && break
          done
