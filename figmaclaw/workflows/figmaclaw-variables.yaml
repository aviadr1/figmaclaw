# Installed by: figmaclaw init (or figmaclaw workflows upgrade)
# Upgrade after tool update: figmaclaw workflows upgrade
# Logic lives in: aviadr1/figmaclaw/.github/workflows/variables.yml

name: figmaclaw — variables catalog

on:
  workflow_dispatch:
    inputs:
      file_key:
        description: 'Refresh variables only for this file key (default: all tracked files)'
        required: false
        default: ''
      variables_source:
        description: 'Variable-definition reader: auto, rest, or mcp'
        required: false
        default: auto
      require_authoritative:
        description: 'Fail unless refreshed catalog contains authoritative variable definitions'
        required: false
        type: boolean
        default: false

concurrency:
  group: figma-git-variables
  cancel-in-progress: true

jobs:
  variables:
    uses: aviadr1/figmaclaw/.github/workflows/variables.yml@main
    with:
      file_key: ${{ github.event.inputs.file_key || '' }}
      variables_source: ${{ github.event.inputs.variables_source || 'auto' }}
      require_authoritative: ${{ github.event.inputs.require_authoritative || false }}
      target_ref: ${{ github.ref_name }}
    secrets:
      FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
      FIGMA_VARIABLES_TOKEN: ${{ secrets.FIGMA_VARIABLES_TOKEN }}
      FIGMA_MCP_TOKEN: ${{ secrets.FIGMA_MCP_TOKEN }}
