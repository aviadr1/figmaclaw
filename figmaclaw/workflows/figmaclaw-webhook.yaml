# Installed by: figmaclaw init (or figmaclaw workflows upgrade)
# Upgrade after tool update: figmaclaw workflows upgrade
# Logic lives in: aviadr1/figmaclaw/.github/workflows/webhook.yml

name: figmaclaw — Figma webhook

on:
  repository_dispatch:
    types: [figma-webhook]

jobs:
  apply-webhook:
    # Debounce only the cheap webhook apply job. Do not use workflow-level
    # cancellation here: changed-only Claude enrichment is expensive authored
    # work and must not be killed by a later webhook.
    concurrency:
      group: figma-git-webhook-apply-${{ github.ref }}
      cancel-in-progress: true
    uses: aviadr1/figmaclaw/.github/workflows/webhook.yml@main
    with:
      # github.event is not available in the callee — pass payload as input
      webhook_payload: ${{ toJson(github.event.client_payload) }}
    secrets:
      FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
      FIGMA_WEBHOOK_SECRET: ${{ secrets.FIGMA_WEBHOOK_SECRET }}

  # Changed-only enrichment after webhook apply.
  enrich:
    needs: apply-webhook
    if: success()
    uses: aviadr1/figmaclaw/.github/workflows/claude-run.yml@main
    with:
      target: figma/
      model: claude-sonnet-4-6
      max_turns: 80
      changed_only: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
