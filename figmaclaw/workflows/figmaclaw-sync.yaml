# SOURCE OF TRUTH: aviadr1/figmaclaw
# All logic for the sync job lives in aviadr1/figmaclaw/.github/workflows/sync.yml
# Make changes there, not here. This file just calls that reusable workflow.
# To upgrade: figmaclaw workflows upgrade

name: figmaclaw — nightly sync

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full regeneration of all pages'
        required: false
        default: 'false'
      since:
        description: 'Discover files modified within this window (e.g. 3m, 7d, 1y, all). Default: 3m'
        required: false
        default: '3m'

# Must be in caller: concurrency groups are repo-scoped.
# Shared with webhook so both queue behind each other.
# cancel-in-progress: false — never drop a scheduled sync run.
concurrency:
  group: figma-git-sync
  cancel-in-progress: false

jobs:
  sync:
    uses: aviadr1/figmaclaw/.github/workflows/sync.yml@main
    with:
      force: ${{ github.event.inputs.force || 'false' }}
      since: ${{ github.event.inputs.since || '3m' }}
      figma_team_id: ${{ vars.FIGMA_TEAM_ID }}
    secrets:
      FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}

  # Whole-page enrichment: all pages up to 500 frames
  # Subagent batching (8 frames/batch) handles pages up to ~500 frames
  # within the 55-minute timeout. Sorted smallest-first for throughput.
  enrich:
    needs: sync
    if: success()
    uses: aviadr1/figmaclaw/.github/workflows/claude-run.yml@main
    with:
      target: figma/
      model: claude-sonnet-4-6
      max_turns: 80
      needs_enrichment: true
      max_frames: 500
      max_files: 0
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}

  # Giant page enrichment (>500 frames): section-by-section
  # Each section is committed independently — resumes where
  # it left off if timeout occurs.
  enrich-large:
    needs: sync
    if: success()
    uses: aviadr1/figmaclaw/.github/workflows/claude-run.yml@main
    with:
      target: figma/
      model: claude-sonnet-4-6
      max_turns: 80
      needs_enrichment: true
      min_frames: 501
      max_files: 0
      section_mode: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
