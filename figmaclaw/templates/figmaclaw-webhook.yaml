name: figmaclaw — Figma webhook

on:
  repository_dispatch:
    types: [figma-webhook]

# Debounce: only the latest event per file wins
concurrency:
  group: figma-webhook-${{ github.event.client_payload.file_id }}
  cancel-in-progress: true

jobs:
  apply-webhook:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install figmaclaw
        run: pip install uv && uv tool install git+https://github.com/aviadr1/figmaclaw

      - name: Pull latest changes
        run: git pull --no-rebase

      - name: Configure git
        run: |
          git config user.name "figmaclaw[bot]"
          git config user.email "figmaclaw[bot]@users.noreply.github.com"

      - name: Apply webhook (auto-commit per page)
        id: apply
        continue-on-error: true  # timeout/quota errors still allow final push below
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_WEBHOOK_SECRET: ${{ secrets.FIGMA_WEBHOOK_SECRET }}
          FIGMA_WEBHOOK_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          figmaclaw apply-webhook --auto-commit --push-every 10 | tee /tmp/figmaclaw-out.txt
          COMMIT_MSG=$(grep '^COMMIT_MSG:' /tmp/figmaclaw-out.txt | head -1 | sed 's/^COMMIT_MSG://')
          echo "commit_msg=${COMMIT_MSG}" >> "$GITHUB_OUTPUT"

      - name: Push remaining commits
        if: always()
        run: |
          git add figma/ .figma-sync/
          if ! git diff --cached --quiet; then
            COMMIT_MSG="${{ steps.apply.outputs.commit_msg }}"
            if [ -z "$COMMIT_MSG" ]; then
              COMMIT_MSG="sync: figmaclaw — checkpoint (partial run)"
            fi
            git commit -m "$COMMIT_MSG"
          fi
          git push || (git pull --no-rebase && git push)
