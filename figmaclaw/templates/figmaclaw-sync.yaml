name: figmaclaw — nightly sync

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full regeneration of all pages'
        required: false
        default: 'false'
      since:
        description: 'Discover files modified within this window (e.g. 3m, 7d, 1y, all). Default: 3m'
        required: false
        default: '3m'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install figmaclaw
        run: pip install uv && uv tool install git+https://github.com/aviadr1/figmaclaw

      - name: Pull latest changes
        run: git pull --no-rebase

      - name: Configure git
        run: |
          git config user.name "figmaclaw[bot]"
          git config user.email "figmaclaw[bot]@users.noreply.github.com"

      - name: Discover and track new Figma files
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          FIGMA_TEAM_ID: ${{ vars.FIGMA_TEAM_ID }}
        run: |
          SINCE="${{ github.event.inputs.since }}"
          if [ -z "$SINCE" ]; then
            SINCE="3m"
          fi
          figmaclaw list "$FIGMA_TEAM_ID" --since "$SINCE" --track-only | tee /tmp/figmaclaw-discover.txt || true

          git add .figma-sync/
          if ! git diff --cached --quiet; then
            NEWLY=$(grep '^NEWLY_TRACKED:' /tmp/figmaclaw-discover.txt | head -1 | sed 's/^NEWLY_TRACKED://')
            git commit -m "sync: figmaclaw — tracking ${NEWLY:-?} new file(s)"
            git push
            git pull --no-rebase
          fi

      - name: Pull Figma files (auto-commit per page, push every 10)
        continue-on-error: true  # partial progress is committed; final push runs regardless
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          figmaclaw pull --auto-commit --push-every 10 $FORCE_FLAG

      - name: Push remaining commits
        if: always()
        run: |
          git add figma/ .figma-sync/
          if ! git diff --cached --quiet; then
            git commit -m "sync: figmaclaw — checkpoint (partial run)"
          fi
          git push || (git pull --no-rebase && git push)
