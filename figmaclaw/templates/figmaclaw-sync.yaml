name: figmaclaw — nightly sync

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full regeneration of all pages'
        required: false
        default: 'false'
      since:
        description: 'Discover files modified within this window (e.g. 3m, 7d, 1y, all). Default: 3m'
        required: false
        default: '3m'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install figmaclaw
        run: pip install uv && uv tool install git+https://github.com/aviadr1/figmaclaw

      - name: Pull latest changes
        run: git pull --no-rebase

      - name: Configure git
        run: |
          git config user.name "figmaclaw[bot]"
          git config user.email "figmaclaw[bot]@users.noreply.github.com"

      - name: Discover and track new Figma files
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          FIGMA_TEAM_ID: ${{ vars.FIGMA_TEAM_ID }}
        run: |
          SINCE="${{ github.event.inputs.since }}"
          if [ -z "$SINCE" ]; then
            SINCE="3m"
          fi
          figmaclaw list "$FIGMA_TEAM_ID" --since "$SINCE" --track-only | tee /tmp/figmaclaw-discover.txt || true

          # Commit manifest if new files were tracked
          git add .figma-sync/
          if ! git diff --cached --quiet; then
            NEWLY=$(grep '^NEWLY_TRACKED:' /tmp/figmaclaw-discover.txt | head -1 | sed 's/^NEWLY_TRACKED://')
            git commit -m "sync: figmaclaw — tracking ${NEWLY:-?} new file(s)"
            git push
            git pull --no-rebase
          fi

      - name: Pull Figma files (checkpointed loop)
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          BATCH=0
          while true; do
            BATCH=$((BATCH + 1))
            echo "--- batch $BATCH ---"

            # On force runs, pull everything in one shot (no page limit)
            if [ -n "$FORCE_FLAG" ]; then
              figmaclaw pull $FORCE_FLAG | tee /tmp/figmaclaw-out.txt || true
            else
              figmaclaw pull --max-pages 20 | tee /tmp/figmaclaw-out.txt || true
            fi

            # Commit and push whatever was written in this batch
            git add figma/ .figma-sync/
            if ! git diff --cached --quiet; then
              COMMIT_MSG=$(grep '^COMMIT_MSG:' /tmp/figmaclaw-out.txt | head -1 | sed 's/^COMMIT_MSG://')
              if [ -z "$COMMIT_MSG" ]; then
                COMMIT_MSG="sync: figmaclaw — checkpoint batch $BATCH"
              fi
              git commit -m "$COMMIT_MSG"
              git push
              git pull --no-rebase
            fi

            # Stop if no more pages remain, or this was a force run
            grep -q '^HAS_MORE:true' /tmp/figmaclaw-out.txt || break
            [ -n "$FORCE_FLAG" ] && break
          done
