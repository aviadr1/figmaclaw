name: figmaclaw — nightly sync

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full regeneration of all pages'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install figmaclaw
        run: pip install git+https://github.com/aviadr1/figmaclaw

      - name: Pull latest changes
        run: git pull --no-rebase

      - name: Pull Figma files
        id: pull
        continue-on-error: true  # timeout/quota errors still save partial progress below
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          figmaclaw pull ${FORCE_FLAG} | tee /tmp/figmaclaw-out.txt
          COMMIT_MSG=$(grep '^COMMIT_MSG:' /tmp/figmaclaw-out.txt | head -1 | sed 's/^COMMIT_MSG://')
          echo "commit_msg=${COMMIT_MSG}" >> "$GITHUB_OUTPUT"

      - name: Commit and push progress
        if: always()  # run even after timeout/quota error — commits partial manifest progress
        run: |
          git config user.name "figmaclaw[bot]"
          git config user.email "figmaclaw[bot]@users.noreply.github.com"
          git add figma/ .figma-sync/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            COMMIT_MSG="${{ steps.pull.outputs.commit_msg }}"
            if [ -z "$COMMIT_MSG" ]; then
              COMMIT_MSG="sync: figmaclaw — checkpoint (partial run)"
            fi
            git commit -m "$COMMIT_MSG"
            git push
          fi
